<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ece5dd;
}

header {
    background: #075e54;
    color: white;
    padding: 15px;
    font-size: 18px;
}

#chat {
    height: calc(100vh - 120px);
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 60%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    font-size: 14px;
}

.me {
    background: #dcf8c6;
    align-self: flex-end;
}

.other {
    background: white;
    align-self: flex-start;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

#msg {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 50%;
    background: #075e54;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<header>💬 Online Chat</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");
const ws = new WebSocket(location.origin.replace("http", "ws"));

ws.onmessage = (event) => {
    addMessage(event.data, "other");
};

function sendMsg() {
    let input = document.getElementById("msg");
    let message = input.value.trim();

    if (message === "") return;

    ws.send(message);
    addMessage(message, "me");

    input.value = "";
}

function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
